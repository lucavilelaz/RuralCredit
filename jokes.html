<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>😄 Joke Generator - Random Jokes API</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      margin-bottom: 20px;
    }

    #joke-container {
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .joke-card {
      width: 100%;
    }

    .joke-setup {
      font-size: 1.3em;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .joke-reveal {
      width: 100%;
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }

    .joke-reveal:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .joke-reveal:active {
      transform: translateY(0);
    }

    .joke-punchline {
      background: #f0f4ff;
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      margin-bottom: 15px;
    }

    .joke-punchline p {
      font-size: 1.2em;
      font-weight: 600;
      color: #667eea;
      line-height: 1.6;
    }

    .joke-meta {
      text-align: center;
      padding-top: 15px;
      border-top: 1px solid #eee;
      color: #999;
    }

    .joke-error {
      text-align: center;
      color: #e74c3c;
    }

    .joke-error p {
      font-size: 1.1em;
      margin: 10px 0;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px 20px;
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #667eea;
      color: white;
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    #joke-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      width: 100%;
      margin-bottom: 15px;
    }

    #joke-btn:hover {
      background: linear-gradient(135deg, #5568d3 0%, #6a3f92 100%);
      color: white;
    }

    #joke-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-content {
      background: white;
      border-radius: 15px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-header h2 {
      color: #333;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5em;
      cursor: pointer;
      color: #999;
    }

    .modal-close:hover {
      color: #333;
    }

    .history-item {
      padding: 15px;
      border: 1px solid #eee;
      border-radius: 8px;
      margin-bottom: 15px;
      background: #f9f9f9;
    }

    .history-item p {
      margin: 8px 0;
      color: #333;
      font-size: 0.95em;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      border-top: 1px solid #eee;
      padding-top: 20px;
    }

    .modal-footer button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-close {
      background: #f0f0f0;
      color: #333;
    }

    .btn-close:hover {
      background: #e0e0e0;
    }

    .btn-clear {
      background: #e74c3c;
      color: white;
    }

    .btn-clear:hover {
      background: #c0392b;
    }

    .footer {
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.9em;
      margin-top: 30px;
    }

    .footer a {
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .header h1 {
        font-size: 2em;
      }

      .card {
        padding: 25px;
      }

      .controls {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>😄 Joke Generator</h1>
      <p>Piadas aleatórias de uma API externa</p>
    </div>

    <div class="card">
      <div id="joke-container">
        <p style="text-align: center; color: #999;">Carregando piada...</p>
      </div>

      <button id="joke-btn" class="btn" style="width: 100%;">😄 Próxima Piada</button>

      <div class="controls">
        <button id="history-btn" class="btn">📚 Histórico</button>
        <button onclick="window.jokes.revealPunchline()" class="btn">👉 Ver Piada</button>
      </div>
    </div>

    <div class="footer">
      <p>Powered by <a href="https://official-joke-api.appspot.com/" target="_blank">Official Joke API</a></p>
      <p style="margin-top: 10px; opacity: 0.8;">Built with ❤️ by Copilot</p>
    </div>
  </div>

  <!-- Modal de Histórico -->
  <div id="history-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📚 Histórico de Piadas</h2>
        <button id="close-history" class="modal-close">✕</button>
      </div>

      <div id="history-list">
        <p style="text-align: center; color: #999;">Nenhuma piada ainda</p>
      </div>

      <div class="modal-footer">
        <button id="close-history" class="btn-close">Fechar</button>
        <button id="clear-history" class="btn-clear">Limpar Histórico</button>
      </div>
    </div>
  </div>

  <script src="js/jokes.js"></script>
</body>
</html>

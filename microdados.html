<button onclick="diagnosticar()">Diagnosticar endpoint</button>

<script>
async function diagnosticar() {
  const endpoint = document.getElementById("endpoint").value;
  const ano = document.getElementById("ano").value;

  const testes = [
    { nome: "JSON simples", params: { "$format": "json", "$top": "1" } },
    { nome: "JSON com ano", params: { "$format": "json", "$top": "1", "$filter": `AnoEmissao eq '${ano}'` } },
    { nome: "JSON sem select página 100", params: { "$format": "json", "$top": "100", "$skip": "0" } },
    { nome: "CSV simples", params: { "$format": "text/csv", "$top": "10" } }
  ];

  document.getElementById("log").textContent = "";

  for (const t of testes) {
    const url = "/api/bcb?" + new URLSearchParams({
      endpoint,
      ...t.params
    }).toString();

    log("Testando: " + t.nome);
    log(url);

    try {
      const res = await fetch(url);
      const text = await res.text();

      log("HTTP " + res.status);
      log(text.slice(0, 500));
      log("----------------------");
    } catch (e) {
      log("ERRO: " + e.message);
      log("----------------------");
    }
  }
}
</script>

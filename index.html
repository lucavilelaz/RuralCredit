<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste BCB</title>
</head>
<body>
  <h1>Teste API BCB</h1>

  <button onclick="testeSegmento()">Testar SegmentoTipoPessoa</button>
  <button onclick="testeMunicipio()">Testar Município 2013</button>

  <pre id="out"></pre>

  <script>
    function buildUrl(endpoint, params) {
      const qs = Object.entries(params)
        .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
        .join("&");

      return `/api/bcb?endpoint=${encodeURIComponent(endpoint)}&${qs}`;
    }

    async function chamar(url) {
      document.getElementById("out").textContent = "Carregando...\n" + url;

      const res = await fetch(url);
      const text = await res.text();

      document.getElementById("out").textContent =
        "HTTP " + res.status + "\n\n" + text;
    }

    function testeSegmento() {
      chamar(buildUrl("SegmentoTipoPessoa", {
        "$format": "json",
        "$top": "5"
      }));
    }

    function testeMunicipio() {
      chamar(buildUrl("CusteioInvestimentoComercialIndustrialSemFiltros", {
        "$format": "json",
        "$top": "5",
        "$filter": "AnoEmissao eq '2013'"
      }));
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Teste BCB API</title>
</head>
<body>
  <h1>Teste API BCB (via Vercel)</h1>
  <button onclick="load()">Carregar dados</button>
  <pre id="out"></pre>

  <script>
    async function load() {
      const res = await fetch('/api/bcb?endpoint=SegmentoTipoPessoa&$top=10');
      const data = await res.json();
      document.getElementById('out').textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
